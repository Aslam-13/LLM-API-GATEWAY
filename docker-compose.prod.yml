services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-gateway}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gateway}
      POSTGRES_DB:       ${POSTGRES_DB:-gateway}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gateway} -d ${POSTGRES_DB:-gateway}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 20
    restart: unless-stopped

  # one-shot migration runner; exits 0 on success
  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file: .env.prod
    depends_on:
      postgres: { condition: service_healthy }
    command: ["migrate"]
    restart: "no"

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file: .env.prod
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      migrate:  { condition: service_completed_successfully }
    expose:
      - "8000"
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file: .env.prod
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      migrate:  { condition: service_completed_successfully }
    command: ["worker"]
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    depends_on:
      api: { condition: service_started }
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
